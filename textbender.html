<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEXTBENDER | Hex Glitcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'JetBrains Mono', 'Fira Code', monospace; overflow: hidden; }
        .main-layout { height: calc(100vh - 140px); }
        
        textarea {
            background: #020617;
            color: #22d3ee;
            resize: none;
            scrollbar-width: thin;
            scrollbar-color: #1e293b #020617;
            line-height: 1.6;
            letter-spacing: 2px;
            word-break: break-all;
            white-space: pre-wrap;
            font-size: 13px;
            border: none;
            text-transform: uppercase;
        }

        textarea::selection {
            background: #0891b2;
            color: white;
        }

        .preview-pane {
            background-color: #000;
            background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        #imagePreview {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            image-rendering: auto;
            border: 1px solid #1e293b;
        }

        .status-bar {
            background: #0f172a;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .header-warning {
            color: #f43f5e;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .btn-tool {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s;
            background: #1e293b;
        }
        .btn-tool:hover:not(:disabled) { background: #0891b2; color: white; }
        .btn-tool:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Modal Styles */
        .modal-overlay {
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="p-4">
    <!-- Text Injection Modal -->
    <div id="textModal" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-xl shadow-2xl w-full max-w-md">
            <h2 class="text-cyan-400 font-black uppercase text-sm mb-4 tracking-widest">Inject Text DNA</h2>
            <p class="text-slate-400 text-[10px] mb-4 uppercase">Characters will be converted to Hex and added to your selection.</p>
            <input type="text" id="modalInput" maxlength="20" placeholder="Type here (max 20 chars)..." 
                class="w-full bg-slate-950 border border-slate-700 rounded p-3 mb-2 outline-none focus:border-cyan-500 text-cyan-400 font-mono">
            <div class="flex justify-between items-center mb-6">
                <span id="charCount" class="text-[10px] text-slate-500 font-bold uppercase">0 / 20</span>
            </div>
            <div class="flex gap-2 justify-end">
                <button onclick="closeModal()" class="text-[10px] font-bold uppercase px-4 py-2 text-slate-500 hover:text-white">Cancel</button>
                <button onclick="confirmTextInjection()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2 rounded text-[10px] font-bold uppercase">Inject</button>
            </div>
        </div>
    </div>

    <div class="max-w-[1920px] mx-auto">
        <header class="flex justify-between items-center mb-4 px-2">
            <div class="flex items-center gap-6">
                <h1 class="text-2xl font-black tracking-tighter italic uppercase leading-none">
                    <span class="text-cyan-400">Text</span>bender <span class="text-slate-600 text-sm">v2.6</span>
                </h1>
                <div class="flex gap-2">
                    <input type="file" id="imageLoader" class="hidden" accept="image/*">
                    <button onclick="document.getElementById('imageLoader').click()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-5 py-2 rounded font-bold text-[10px] uppercase transition">Open File</button>
                    <button onclick="downloadImage()" class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-2 rounded font-bold text-[10px] uppercase transition">Export</button>
                    <a href="./databend.html" class="bg-indigo-900/40 hover:bg-indigo-800 text-indigo-300 border border-indigo-700/50 px-5 py-2 rounded font-bold text-[10px] uppercase transition flex items-center">
                        Databend
                    </a>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div id="fileTypeInfo" class="text-[10px] text-slate-500 font-bold uppercase">No Buffer</div>
                <div id="renderStatus" class="text-[10px] font-bold uppercase px-3 py-1 rounded bg-slate-900 text-slate-400">IDLE</div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 main-layout">
            <div class="flex flex-col bg-slate-900 rounded-xl border border-slate-800 overflow-hidden shadow-2xl">
                <div class="status-bar px-4 py-3 border-b border-slate-800 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <span class="header-warning font-black text-[9px]">DO NOT EDIT START OF HEX</span>
                        <span class="text-slate-500">Hex-Data Stream</span>
                    </div>
                    <div id="byteCount" class="text-slate-500 font-mono text-[10px]">0 / 100 KB</div>
                </div>
                
                <textarea id="textEditor" class="flex-grow p-6 outline-none" spellcheck="false" placeholder="Waiting for binary stream..."></textarea>
                
                <div class="p-3 bg-black/40 border-t border-slate-800 flex flex-wrap gap-2">
                    <button onclick="applyGlitch('scramble')" class="btn-tool bg-cyan-900/30 text-cyan-400 border border-cyan-800/50" title="Glitch selected or random area">Scramble Selection</button>
                    <button onclick="openModal()" class="btn-tool" title="Insert readable text as hex">Insert Text DNA</button>
                    <button onclick="injectBytes(10)" class="btn-tool" title="Add 10 random bytes">Add Bytes</button>
                    
                    <div class="h-8 w-px bg-slate-800 mx-2"></div>
                    
                    <button id="undoBtn" onclick="undo()" disabled class="btn-tool" title="Undo latest action">Undo</button>
                    <button onclick="resetToOriginal()" class="btn-tool bg-red-900/20 text-red-500 border border-red-900/30 ml-auto">Reset</button>
                </div>
            </div>

            <div class="flex flex-col bg-slate-900 rounded-xl border border-slate-800 overflow-hidden shadow-2xl">
                <div class="status-bar px-4 py-3 border-b border-slate-800">Visual Re-render</div>
                <div class="flex-grow preview-pane flex items-center justify-center relative overflow-hidden">
                    <div id="emptyState" class="text-slate-800 font-black text-6xl uppercase italic opacity-10">Empty</div>
                    <img id="imagePreview" class="hidden">
                    <div id="loadingOverlay" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center hidden z-10">
                        <div class="text-cyan-400 font-black text-xs uppercase tracking-[0.3em] animate-pulse">Processing Buffer...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let originalHex = "";
        let history = []; 
        let headerHexLength = 0;
        let activeMime = "image/jpeg";
        const editor = document.getElementById('textEditor');
        const preview = document.getElementById('imagePreview');
        const loading = document.getElementById('loadingOverlay');
        const status = document.getElementById('renderStatus');
        const undoBtn = document.getElementById('undoBtn');
        const modal = document.getElementById('textModal');
        const modalInput = document.getElementById('modalInput');
        const charCount = document.getElementById('charCount');

        modalInput.oninput = () => {
            charCount.innerText = `${modalInput.value.length} / 20`;
        };

        function openModal() {
            modal.classList.remove('hidden');
            modalInput.focus();
        }

        function closeModal() {
            modal.classList.add('hidden');
            modalInput.value = "";
            charCount.innerText = "0 / 20";
        }

        function confirmTextInjection() {
            const userInput = modalInput.value;
            if (userInput) {
                saveHistory();
                const hexString = Array.from(userInput)
                    .map(c => c.charCodeAt(0).toString(16).padStart(2, '0'))
                    .join(' ') + ' ';
                
                const pos = editor.selectionStart || editor.value.length;
                editor.value = editor.value.substring(0, pos) + hexString + editor.value.substring(pos);
                updatePreview();
            }
            closeModal();
        }

        document.getElementById('imageLoader').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            loading.classList.remove('hidden');
            activeMime = file.type;
            history = [];
            updateUndoState();
            try {
                let bytes;
                if (file.size > 100 * 1024) {
                    bytes = await downscaleImage(file);
                } else {
                    const ab = await file.arrayBuffer();
                    bytes = new Uint8Array(ab);
                }
                detectHeader(bytes);
                originalHex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join(' ');
                editor.value = originalHex;
                updatePreview();
                updateMeta(bytes.length);
            } catch (err) {
                status.innerText = "Buffer Error";
            } finally {
                loading.classList.add('hidden');
            }
        };

        async function downscaleImage(file) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const targetSize = 100 * 1024;
                    const scale = Math.min(1, Math.sqrt(targetSize / file.size));
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob((blob) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(new Uint8Array(reader.result));
                        reader.readAsArrayBuffer(blob);
                    }, activeMime, 0.8);
                    URL.revokeObjectURL(img.src);
                };
            });
        }

        function saveHistory() {
            history.push(editor.value);
            if (history.length > 20) history.shift();
            updateUndoState();
        }

        function undo() {
            if (history.length > 0) {
                editor.value = history.pop();
                updateUndoState();
                updatePreview();
                updateMeta(Math.floor(editor.value.length / 3));
            }
        }

        function updateUndoState() {
            undoBtn.disabled = history.length === 0;
        }

        function detectHeader(buf) {
            const info = document.getElementById('fileTypeInfo');
            let byteHeader = 0;
            if (buf[0] === 0xFF && buf[1] === 0xD8) { byteHeader = 600; info.innerText = "JPEG Buffer"; }
            else if (buf[0] === 0x89 && buf[1] === 0x50) { byteHeader = 33; info.innerText = "PNG Buffer"; }
            else if (buf[0] === 0x42 && buf[1] === 0x4D) { byteHeader = 54; info.innerText = "BMP Buffer"; }
            headerHexLength = byteHeader * 3; 
        }

        editor.oninput = () => {
            updatePreview();
            updateMeta(Math.floor(editor.value.length / 3));
        };

        function updatePreview() {
            if (!editor.value) return;
            status.innerText = "PARSING";
            status.className = "text-[10px] font-bold uppercase px-3 py-1 rounded bg-cyan-900/40 text-cyan-400 animate-pulse";
            try {
                const hex = editor.value.replace(/[^0-9a-fA-F]/g, '');
                const uint8 = new Uint8Array(hex.length / 2);
                for (let i = 0; i < hex.length; i += 2) {
                    uint8[i/2] = parseInt(hex.substr(i, 2), 16);
                }
                const blob = new Blob([uint8], { type: activeMime });
                const url = URL.createObjectURL(blob);
                preview.onload = () => {
                    URL.revokeObjectURL(url);
                    status.innerText = "STABLE";
                    status.className = "text-[10px] font-bold uppercase px-3 py-1 rounded bg-emerald-900/40 text-emerald-400";
                    preview.classList.remove('hidden');
                    document.getElementById('emptyState').classList.add('hidden');
                };
                preview.onerror = () => {
                    status.innerText = "BROKEN DATA";
                    status.className = "text-[10px] font-bold uppercase px-3 py-1 rounded bg-red-900/40 text-red-500";
                };
                preview.src = url;
            } catch (e) { status.innerText = "HEX ERROR"; }
        }

        function applyGlitch(type) {
            if (!editor.value) return;
            saveHistory();
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            let val = editor.value;
            if (type === 'scramble') {
                let rangeText;
                let isSelection = start !== end;
                if (isSelection) {
                    rangeText = val.substring(start, end);
                } else {
                    const pos = Math.max(headerHexLength, Math.floor(Math.random() * (val.length - 150)));
                    rangeText = val.substring(pos, pos + 150);
                }
                const scrambled = rangeText.split('').map(c => {
                    if (/[0-9a-fA-F]/.test(c)) return Math.floor(Math.random() * 16).toString(16);
                    return c;
                }).join('');
                if (isSelection) {
                    editor.value = val.substring(0, start) + scrambled + val.substring(end);
                } else {
                    const pos = Math.max(headerHexLength, Math.floor(Math.random() * (val.length - 150)));
                    editor.value = val.substring(0, pos) + scrambled + val.substring(pos + 150);
                }
            }
            updatePreview();
        }

        function injectBytes(n) {
            saveHistory();
            let hex = "";
            for(let i=0; i<n; i++) {
                hex += Math.floor(Math.random() * 256).toString(16).padStart(2, '0') + " ";
            }
            const pos = editor.selectionStart || editor.value.length;
            editor.value = editor.value.substring(0, pos) + hex + editor.value.substring(pos);
            updatePreview();
        }

        function resetToOriginal() {
            if (!originalHex) return;
            saveHistory();
            editor.value = originalHex;
            updatePreview();
        }

        function downloadImage() {
            const hex = editor.value.replace(/[^0-9a-fA-F]/g, '');
            const uint8 = new Uint8Array(hex.length / 2);
            for (let i = 0; i < hex.length; i += 2) {
                uint8[i/2] = parseInt(hex.substr(i, 2), 16);
            }
            const blob = new Blob([uint8], { type: activeMime });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `textbender_glitch.${activeMime.split('/')[1]}`;
            a.click();
        }

        function updateMeta(bytes) {
            document.getElementById('byteCount').innerText = `${Math.round(bytes/1024)} KB / 100 KB LIMIT`;
        }
    </script>
</body>
</html>
